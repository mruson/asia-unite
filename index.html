<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asia Army United</title>
  <style>
    :root {
      --bg: #2d2d2d;
      --bg-secondary: #3a3a3a;
      --text: #f0f0f0;
      --text-muted: rgba(240,240,240,0.5);
      --border: rgba(255,255,255,0.1);
      --country-base: #1a1a1a;
      --country-stroke: #2d2d2d;
      --purple: #e63946;
      --purple-glow: rgba(230, 57, 70, 0.5);
      --modal-bg: #1e1e1e;
      --modal-border: rgba(230, 57, 70, 0.25);
    }

    [data-theme="light"] {
      --bg: #f0f0f0;
      --bg-secondary: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: rgba(0,0,0,0.4);
      --border: rgba(0,0,0,0.1);
      --country-stroke: #f0f0f0;
      --modal-bg: #ffffff;
      --modal-border: rgba(230, 57, 70, 0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--purple);
      box-shadow: 0 0 8px var(--purple-glow);
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .member-count {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* ── Map ── */
    .map-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1.5rem 2rem;
    }

    #world-map {
      width: 100%;
      max-width: 1200px;
      height: auto;
      cursor: grab;
    }

    #world-map:active { cursor: grabbing; }

    .country {
      fill: var(--country-base);
      stroke: var(--country-stroke);
      stroke-width: 0.4;
      transition: fill 0.15s, filter 0.15s;
    }

    .country.member {
      cursor: pointer;
    }

    .country.member:hover,
    .country.member.active {
      fill: var(--purple);
      filter: drop-shadow(0 0 6px var(--purple-glow));
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--purple);
      color: #fff;
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.1s;
      transform: translateY(-4px);
    }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(2px);
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--modal-bg);
      border: 1px solid var(--modal-border);
      border-radius: 12px;
      padding: 2rem;
      max-width: 460px;
      width: 100%;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px var(--modal-border);
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .modal-flag {
      font-size: 2.8rem;
      line-height: 1;
    }

    .modal-title h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .modal-title .region-tag {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--purple);
      text-transform: uppercase;
    }

    .modal-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.2rem;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .modal-stat {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
    }

    .modal-stat .stat-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 0.2rem;
    }

    .modal-stat .stat-value {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .modal-goals-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 0.5rem;
    }

    .modal-goals-text {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      display: block;
    }

    .btn-donate {
      background: var(--purple);
      color: #fff;
      border: 1px solid var(--purple);
    }

    .btn-donate:hover {
      filter: brightness(1.15);
    }

    .btn-help {
      background: none;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-help:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* ── Custom dropdown ── */
    .custom-select {
      position: relative;
      min-width: 160px;
    }

    .select-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .select-trigger:hover,
    .select-trigger.open {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .select-trigger-label { flex: 1; }

    .select-chevron {
      flex-shrink: 0;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .select-trigger.open .select-chevron { transform: rotate(180deg); }

    .select-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 100%;
      background: var(--modal-bg);
      border: 1px solid var(--modal-border);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      z-index: 400;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
      animation: dropDown 0.15s ease;
    }

    .select-menu.open { display: block; }

    @keyframes dropDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .select-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
      border-left: 2px solid transparent;
    }

    .select-option:hover {
      background: var(--bg-secondary);
    }

    .select-option.selected {
      color: var(--purple);
      border-left-color: var(--purple);
      background: var(--bg-secondary);
    }

    .select-option-flag { font-size: 1rem; line-height: 1; }
    .select-option-name { font-weight: 500; }

    /* ── Footer hint ── */
    .hint {
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0.75rem 0 1rem;
    }

    /* ── Fanbases section ── */
    .fanbases {
      padding: 2.5rem 2.5rem 3.5rem;
      border-top: 1px solid var(--border);
    }

    .fanbases-heading {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .fanbases-heading span {
      display: inline-block;
      position: relative;
    }

    .fanbases-heading span::before,
    .fanbases-heading span::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 3rem;
      height: 1px;
      background: var(--border);
    }

    .fanbases-heading span::before { right: calc(100% + 0.9rem); }
    .fanbases-heading span::after  { left:  calc(100% + 0.9rem); }

    .fanbases-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.75rem 2.25rem;
    }

    .fanbase-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
    }

    .fanbase-logo {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .fanbase-logo:hover {
      border-color: var(--purple);
      box-shadow: 0 0 14px var(--purple-glow);
      transform: translateY(-2px);
    }

    .fanbase-logo svg {
      opacity: 0.2;
    }

    .fanbase-label {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-align: center;
      max-width: 82px;
      line-height: 1.4;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      body {
        min-height: 100dvh;
      }

      header {
        flex-wrap: wrap;
        padding: 0.75rem 1rem 0.6rem;
        gap: 0.5rem;
        flex-shrink: 0;
      }

      .logo { flex: 1; }

      .header-actions {
        width: 100%;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .member-count { display: none; }

      .custom-select {
        flex: 1;
        min-width: 0;
      }

      .select-trigger {
        font-size: 0.8rem;
      }

      .select-menu {
        min-width: 100%;
      }

      /* Map: fixed viewport height so fanbases section scrolls below */
      .map-wrap {
        flex: none;
        height: calc(100dvh - 90px);
        padding: 0;
        overflow: hidden;
        align-items: stretch;
      }

      /* SVG fills the full map container */
      #world-map {
        width: 100%;
        height: 100%;
        max-width: none;
        display: block;
      }

      /* Hide the hint */
      .hint { display: none; }

      /* Fanbases: compact on mobile */
      .fanbases {
        padding: 2rem 1.25rem 3rem;
      }

      .fanbase-logo {
        width: 62px;
        height: 62px;
      }

      .fanbase-logo svg {
        width: 26px;
        height: 26px;
      }

      .fanbases-grid {
        gap: 1.25rem 1.5rem;
      }

      /* Floating centered modal on mobile */
      .overlay {
        align-items: center;
        padding: 1.25rem;
      }

      .modal {
        max-width: 100%;
        width: 100%;
        border-radius: 12px;
        padding: 1.5rem 1.25rem;
        max-height: 85dvh;
        overflow-y: auto;
      }

      .modal-flag { font-size: 2.2rem; }
      .modal-title h2 { font-size: 1.2rem; }
    }

    @media (max-width: 400px) {
      h1 { font-size: 0.85rem; letter-spacing: 0.15em; }
      .theme-btn { padding: 0.35rem 0.6rem; font-size: 0.7rem; }
      .modal-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>

      },
    };

    // ── Populate custom dropdown ──
    const selectMenu = document.getElementById("select-menu");

    // "All Countries" option
    const allOpt = document.createElement("div");
    allOpt.className = "select-option selected";
    allOpt.dataset.value = "";
    allOpt.innerHTML = `<span class="select-option-name">All Countries</span>`;
    allOpt.onclick = () => { onDropdownChange(""); closeDropdown(); };
    selectMenu.appendChild(allOpt);

    Object.entries(MEMBERS)
      .sort((a, b) => a[1].name.localeCompare(b[1].name))
      .forEach(([id, data]) => {
        const opt = document.createElement("div");
        opt.className = "select-option";
        opt.dataset.value = id;
        opt.innerHTML = `<span class="select-option-flag">${data.flag}</span><span class="select-option-name">${data.name}</span>`;
        opt.onclick = () => { onDropdownChange(id); closeDropdown(); };
        selectMenu.appendChild(opt);
      });

    function toggleDropdown() {
      const trigger = document.getElementById("select-trigger");
      const menu    = document.getElementById("select-menu");
      const isOpen  = menu.classList.contains("open");
      isOpen ? closeDropdown() : openDropdown();
    }

    function openDropdown() {
      document.getElementById("select-trigger").classList.add("open");
      document.getElementById("select-menu").classList.add("open");
    }

    function closeDropdown() {
      document.getElementById("select-trigger").classList.remove("open");
      document.getElementById("select-menu").classList.remove("open");
    }

    // Close on outside click
    document.addEventListener("click", e => {
      if (!document.getElementById("custom-select").contains(e.target)) closeDropdown();
    });

    // ── D3 Map ──
    const svg = d3.select("#world-map");
    const projection = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
    const path = d3.geoPath().projection(projection);
    const tooltip = document.getElementById("tooltip");

    // Zoom group — all paths live inside here so transforms apply together
    const g = svg.append("g");

    // Bounding boxes per member country (populated after map loads)
    const countryBounds = {};

    const zoom = d3.zoom()
      .scaleExtent([1, 50])
      .clickDistance(4)           // up to 4px movement still counts as a click
      .on("zoom", event => {
        g.attr("transform", event.transform);
        // Keep border lines visually the same thickness while zoomed
        g.selectAll(".country").attr("stroke-width", 0.4 / event.transform.k);
      });

    svg.call(zoom);

    // Asia-centered default for mobile:
    // SVG coords of South/SE Asia center ≈ (690, 225); formula: tx=480-k*cx, ty=250-k*cy
    const MOBILE_DEFAULT = d3.zoomIdentity.translate(480 - 690, 250 - 225); // scale 1, pan to Asia

    function resetZoom() {
      const target = window.innerWidth < 680 ? MOBILE_DEFAULT : d3.zoomIdentity;
      svg.transition().duration(500).ease(d3.easeCubicOut)
        .call(zoom.transform, target);
    }

    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json")
      .then(r => r.json())
      .then(world => {
        const countries = topojson.feature(world, world.objects.countries);

        // Store bounding boxes for member countries
        countries.features.forEach(d => {
          const id = String(d.id).padStart(3, "0");
          if (MEMBERS[id]) countryBounds[id] = path.bounds(d);
        });

        g.selectAll("path")
          .data(countries.features)
          .join("path")
          .attr("d", path)
          .attr("class", d => {
            const id = String(d.id).padStart(3, "0");
            return MEMBERS[id] ? "country member" : "country";
          })
          .on("mousemove", (event, d) => {
            const id = String(d.id).padStart(3, "0");
            if (!MEMBERS[id]) return;
            tooltip.style.opacity = "1";
            tooltip.style.left  = (event.clientX + 14) + "px";
            tooltip.style.top   = (event.clientY - 34) + "px";
            tooltip.textContent = MEMBERS[id].flag + "  " + MEMBERS[id].name;
          })
          .on("mouseleave", () => {
            tooltip.style.opacity = "0";
          })
          .on("click", (event, d) => {
            const id = String(d.id).padStart(3, "0");
            if (!MEMBERS[id]) return;
            selectCountry(id);   // glow + sync dropdown
            openModal(MEMBERS[id]);
          });

        // Mobile: fill screen + focus on Asia
        if (window.innerWidth < 680) {
          document.getElementById("world-map")
            .setAttribute("preserveAspectRatio", "xMidYMid slice");
          svg.call(zoom.transform, MOBILE_DEFAULT);
        }
      });

    // ── Country selection (dropdown & map click) ──
    function zoomToCountry(id) {
      if (!countryBounds[id]) return;
      const [[x0, y0], [x1, y1]] = countryBounds[id];

      // On mobile, preserveAspectRatio="slice" means only part of the 960×500
      // viewBox is visible. Calculate the actual visible SVG dimensions so the
      // scale fits the country into what the user can actually see.
      let W = 960, H = 500;
      if (window.innerWidth < 680) {
        const svgEl = document.getElementById("world-map");
        const svgScale = Math.max(svgEl.clientWidth / 960, svgEl.clientHeight / 500);
        W = svgEl.clientWidth  / svgScale;  // visible SVG units wide
        H = svgEl.clientHeight / svgScale;  // visible SVG units tall
      }

      const minZoom = MEMBERS[id].minZoom || 2;
      const scale = Math.min(50, Math.max(minZoom, 0.85 / Math.max((x1 - x0) / W, (y1 - y0) / H)));
      // With xMidYMid the viewport center always maps to viewBox centre (480, 250)
      const tx = 480 - scale * (x0 + x1) / 2;
      const ty = 250 - scale * (y0 + y1) / 2;
      svg.transition().duration(750).ease(d3.easeCubicOut)
        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    function selectCountry(id) {
      g.selectAll(".country.member").classed("active", false);
      if (id) {
        g.selectAll(".country.member")
          .filter(d => String(d.id).padStart(3, "0") === id)
          .classed("active", true);
        zoomToCountry(id);
      } else {
        resetZoom();
      }
      // Sync custom dropdown
      document.querySelectorAll(".select-option").forEach(opt => {
        opt.classList.toggle("selected", opt.dataset.value === id);
      });
      const data = MEMBERS[id];
      document.getElementById("select-label").textContent = data
        ? data.flag + "  " + data.name
        : "All Countries";
    }

    function onDropdownChange(id) {
      selectCountry(id);
    }

    // ── Modal ──
    function openModal(data) {
      document.getElementById("m-flag").textContent  = data.flag;
      document.getElementById("m-name").textContent  = data.name;
      document.getElementById("m-region").textContent = "";
      document.getElementById("m-goals").textContent = data.goals;
      document.getElementById("m-donate").href       = data.donateUrl;
      document.getElementById("m-help").href         = data.helpUrl;
      document.getElementById("overlay").classList.add("open");
    }

    function closeModal() {
      document.getElementById("overlay").classList.remove("open");
      selectCountry("");
    }

    document.getElementById("overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("overlay")) closeModal();
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeModal();
    });

    // ── Theme ──
    function toggleTheme() {
      const html = document.documentElement;
      const btn  = document.getElementById("theme-btn");
      if (html.dataset.theme === "dark") {
        html.dataset.theme = "light";
        btn.textContent = "Dark";
      } else {
        html.dataset.theme = "dark";
        btn.textContent = "Light";
      }
      // update country stroke to match new bg
      document.querySelectorAll(".country").forEach(el => {
        el.style.stroke = getComputedStyle(document.documentElement)
          .getPropertyValue("--country-stroke").trim();
      });
    }
  </script>
</body>
</html>
